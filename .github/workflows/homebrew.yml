name: homebrew

on:
  release:
    types: [published]
  workflow_dispatch: ~

jobs:
  homebrew-releaser:
    runs-on: ubuntu-latest
    name: homebrew-releaser
    steps:
      - name: Release project to my Homebrew tap
        uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: Justintime50
          homebrew_tap: homebrew-formulas
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          commit_owner: Justintime50
          commit_email: 39606064+Justintime50@users.noreply.github.com
          update_readme_table: true
          # maturin and rust are needed to build the cryptography dependency without pip build isolation
          depends_on: |
            "python@3.14"
            "maturin" => :build
            "rust" => :build
            "openssl@3"
          install: |
            venv = virtualenv_create(libexec, "python3.14")
            cryptography_resource = resources.find { |r| r.name == "cryptography" }
            venv.pip_install resources.reject { |r| r.name == "cryptography" }
            if cryptography_resource
              cryptography_resource.stage do
                system venv.root/"bin/pip", "install", "--no-build-isolation", "-v", "."
              end
            end
            venv.pip_install_and_link buildpath
          test: 'assert_match "github-archive #{version}", shell_output("#{bin}/github-archive --version")'
          formula_includes: 'include Language::Python::Virtualenv'
          update_python_resources: true
